<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weeby Notifier — New Releases</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f2f3f5;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    "
  >
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f2f3f5;">
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <!-- Card -->
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="max-width: 600px; width: 100%; background-color: #ffffff; border: 1px solid #e3e5e9; border-radius: 8px;"
          >
            <!-- Header -->
            <tr>
              <td style="background-color: #1f2937; padding: 24px 32px; border-radius: 8px 8px 0 0;">
                <div style="font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #9ca3af; font-weight: 600;">
                  Weeby Notifier
                </div>
                <div style="font-size: 22px; font-weight: 700; color: #ffffff; margin-top: 4px;">
                  New chapters &amp; episodes available
                </div>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding: 28px 32px 8px 32px;">
                <p style="font-size: 15px; color: #374151; margin: 0 0 22px 0; line-height: 1.6;">
                  Here's what's new on your watch and read list:
                </p>

                {{CHAPTERS}}
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding: 8px 32px 28px 32px;">
                <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 8px 0 18px 0;" />
                <p style="font-size: 13px; color: #6b7280; margin: 0; line-height: 1.6;">
                  Weeby Notifier
                </p>
                <p style="font-size: 12px; color: #9ca3af; margin: 12px 0 0 0; line-height: 1.5;">
                  You're receiving this because you asked for manga and anime release alerts.<br />
                  Powered by MangaDex and AniList.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
